const POS=[];
(function(){
  const beds=[
    {x1:3,y1:3,x2:47,y2:47},{x1:53,y1:3,x2:97,y2:47},
    {x1:3,y1:53,x2:47,y2:97},{x1:53,y1:53,x2:97,y2:97}
  ];
  const cols=6,rows=5;
  beds.forEach(b=>{
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const px=b.x1+2+(c/cols)*(b.x2-b.x1-4)+(Math.random()-0.5)*1.5;
        const py=b.y1+2+(r/rows)*(b.y2-b.y1-4)+(Math.random()-0.5)*1.5;
        POS.push({x:Math.max(b.x1+1,Math.min(b.x2-1,px)),y:Math.max(b.y1+1,Math.min(b.y2-1,py))});
      }
    }
  });
})();

function getGardenFromURL(){const p=new URLSearchParams(window.location.search);const g=p.get('g');return(g&&DB[g])?g:'A';}

function rFilters(){
  const g=DB[cG];
  document.getElementById('filter-bar').innerHTML=g.filters.map(f=>`<span class="ftag${cFilt.includes(f)?' on':''}" onclick="tFilt('${f}')">${f}</span>`).join('');
  document.getElementById('garden-title').textContent=g.name;
  document.querySelectorAll('.gtab').forEach(t=>t.classList.toggle('on',t.dataset.g===cG));
  const ql=document.getElementById('quiz-link');
  if(ql)ql.href=`quiz.html?g=${cG}`;
}

function tFilt(f){cFilt=cFilt.includes(f)?cFilt.filter(x=>x!==f):[...cFilt,f];cPage=1;rFilters();rPlants();}
function doSearch(){cQ=document.getElementById('si').value.toLowerCase();cPage=1;rPlants();}

function getFilt(){
  return DB[cG].plants.filter(p=>{
    const ms=!cQ||p.n.toLowerCase().includes(cQ)||p.l.toLowerCase().includes(cQ);
    const mf=cFilt.length===0||cFilt.some(f=>p.u.some(u=>u.toLowerCase().includes(f.toLowerCase())));
    return ms&&mf;
  });
}

  return `<svg width="${w}" height="${h}" viewBox="0 0 58 ${h}" fill="none"><path d="M29 ${h} Q28 ${y(0.62)} 29 ${y(0.44)} Q30 ${y(0.26)} 29 ${y(0.09)}" stroke="#4a6828" stroke-width="2.5" stroke-linecap="round"/><path d="M29 ${y(0.72)} Q14 ${y(0.58)} 7 ${y(0.44)}" stroke="#4a6828" stroke-width="1.8" stroke-linecap="round"/><path d="M7 ${y(0.44)} Q-3 ${y(0.28)} 4 ${y(0.18)} Q15 ${y(0.3)} 19 ${y(0.4)}Z" fill="${c}" opacity="0.88"/><path d="M29 ${y(0.58)} Q44 ${y(0.44)} 51 ${y(0.3)}" stroke="#4a6828" stroke-width="1.8" stroke-linecap="round"/><path d="M51 ${y(0.3)} Q61 ${y(0.14)} 55 ${y(0.06)} Q43 ${y(0.16)} 39 ${y(0.26)}Z" fill="${c}" opacity="0.88"/><path d="M29 ${y(0.44)} Q14 ${y(0.3)} 12 ${y(0.15)} Q24 ${y(0.24)} 26 ${y(0.37)}Z" fill="${c}" opacity="0.78"/><path d="M29 ${y(0.36)} Q44 ${y(0.22)} 42 ${y(0.09)} Q30 ${y(0.18)} 28 ${y(0.3)}Z" fill="${c}" opacity="0.78"/><circle cx="29" cy="${y(0.07)}" r="${y(0.058)}" fill="${c}"/></svg>`;
}

function rPlants(){
  const plc=document.getElementById('plc');plc.innerHTML='';
  const fp=getFilt();
  const tp=Math.max(1,Math.ceil(fp.length/perP));
  if(cPage>tp)cPage=1;
  const show=fp.slice((cPage-1)*perP,(cPage-1)*perP+perP);
  document.getElementById('bcnt').textContent=`${fp.length} plant${fp.length!==1?'s':''}`;
  document.getElementById('bpg').textContent=`${cPage}/${tp}`;
  show.forEach((p,i)=>{
    const pos=POS[i%POS.length];
    const sw=Math.round(p.s*0.82);
    const dm=document.createElement('div');
    dm.className='dmound';
    dm.style.cssText=`left:${pos.x}%;top:calc(${pos.y}% + ${Math.round(p.s*0.85)}px);transform:translate(-50%,-50%);width:${Math.round(sw*0.88)}px;height:${Math.round(p.s*0.18)}px;`;
    plc.appendChild(dm);
    const div=document.createElement('div');
    div.className='plant';
    div.style.cssText=`left:${pos.x}%;top:${pos.y}%;`;
    div.innerHTML=`<div class="ptag">${p.n}</div><div class="pb" style="position:relative;">${mkSVG(p.t,p.c,p.s)}<div class="pshadow" style="width:${Math.round(sw*0.75)}px;height:${Math.round(p.s*0.11)}px;"></div></div>`;
    div.addEventListener('click',()=>openP(p));
    plc.appendChild(div);
  });
}

function openP(p){
  const g=DB[cG];
  const bs=document.getElementById('psys');
  bs.textContent=g.name.replace(' Garden','');
  bs.style.background=g.bc;bs.style.color=g.tc;
  document.getElementById('pname').textContent=p.n;
  document.getElementById('platin').textContent=p.l;
  document.getElementById('pabt').textContent=p.a;
  document.getElementById('puse').innerHTML=p.u.map(u=>`<span class="utag">${u}</span>`).join('');
  document.getElementById('pprt').textContent=p.p;
  document.getElementById('phab').textContent=p.h;
  document.getElementById('pbg').innerHTML=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden;opacity:0.35;">${mkSVG(p.t,p.c,160)}</div><div style="position:absolute;inset:0;background:radial-gradient(ellipse at center,${p.c}25 0%,transparent 65%);"></div>`;
  document.getElementById('panel').classList.add('open');
}
function closeP(){document.getElementById('panel').classList.remove('open');}

function swG(g){
  cG=g;cPage=1;cFilt=[];
  history.replaceState(null,'',`?g=${g}`);
  document.getElementById('si').value='';cQ='';
  rFilters();rPlants();closeP();
}
function goPg(d){
  const fp=getFilt();
  const tp=Math.max(1,Math.ceil(fp.length/perP));
  cPage=Math.max(1,Math.min(tp,cPage+d));
  rPlants();
}

const scene=document.getElementById('scene'),world=document.getElementById('world');
function applyT(){world.style.transform=`translate(calc(-50% + ${px}px),calc(-50% + ${py}px)) rotateX(52deg) rotateZ(-45deg) scale(${zm})`;}
scene.addEventListener('mousedown',e=>{if(e.target.closest('.plant'))return;drag=true;scene.classList.add('drag');dsx=e.clientX-px;dsy=e.clientY-py;});
window.addEventListener('mousemove',e=>{if(!drag)return;px=e.clientX-dsx;py=e.clientY-dsy;applyT();});
window.addEventListener('mouseup',()=>{drag=false;scene.classList.remove('drag');});
scene.addEventListener('wheel',e=>{e.preventDefault();zm=Math.min(2.5,Math.max(0.25,zm-e.deltaY*0.001));applyT();},{passive:false});
scene.addEventListener('touchstart',e=>{if(e.touches.length===1&&!e.target.closest('.plant')){drag=true;dsx=e.touches[0].clientX-px;dsy=e.touches[0].clientY-py;}});
scene.addEventListener('touchmove',e=>{if(!drag||e.touches.length!==1)return;px=e.touches[0].clientX-dsx;py=e.touches[0].clientY-dsy;applyT();},{passive:false});
scene.addEventListener('touchend',()=>{drag=false;});

window.addEventListener('load',()=>{
  const u=localStorage.getItem('ayush_user');
  if(!u){window.location.href='login.html';return;}
  cG=getGardenFromURL();
  const lf=document.getElementById('lf');
  document.getElementById('lsub').textContent='Loading '+DB[cG].name+'...';
  let lp=0;
  const lt=setInterval(()=>{lp+=Math.random()*14+6;lf.style.width=Math.min(lp,100)+'%';
    if(lp>=100){clearInterval(lt);setTimeout(()=>{const l=document.getElementById('loader');l.style.opacity='0';setTimeout(()=>l.style.display='none',500);},200);}
  },50);
  rFilters();rPlants();
});
</script>
</body>
</html>
